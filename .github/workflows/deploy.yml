name: CI/CD - Build, Test & Deploy to Cloud Run

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  SERVICE_NAME: portfolio-cloud
  REGION: asia-southeast2 # Jakarta

jobs:
  # ---------- 1) BUILD + TEST ----------
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build (compile check)
        run: npm run build

  # ---------- 2) DEPLOY ----------
  deploy:
    name: Deploy to Cloud Run
    needs: build-test
    # Only deploy on push to main (not on pull requests).
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticate to GCP using a service-account key stored as a GitHub Secret.
      # The secret is NEVER hardcoded in the repo.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # `--source .` lets Cloud Build build the Dockerfile and push the image
      # to Artifact Registry automatically — no manual docker build/push needed.
      # Scaling is configured here via --min-instances / --max-instances.
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --source . \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --cpu 1 \
            --memory 512Mi \
            --concurrency 80 \
            --min-instances 0 \
            --max-instances 10

      - name: Output service URL
        run: |
          echo "Deployed to:"
          gcloud run services describe "$SERVICE_NAME" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "$REGION" \
            --format='value(status.url)'
